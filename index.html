<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSAKA AROMA - Parfum Premium Heritage</title>
    <!-- Menggunakan Font Google untuk kesan lebih elegan dan mewah -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- VARIABEL WARNA & RESET DASAR --- */
        :root {
            --primary-color: #1a1a1a;      /* Hitam elegan */
            --accent-color: #d4af37;       /* Emas (Gold) untuk kesan premium */
            --text-color: #333333;
            --bg-color: #ffffff;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            background-color: #f9f9f9;
            line-height: 1.6;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- HEADER STYLES --- */
        .main-header {
            background-color: var(--bg-color);
            box-shadow: var(--shadow);
            position: sticky; /* Header tetap di atas saat di-scroll */
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }

        .header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 85px;
        }

        /* Logo */
        .logo a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo img {
            height: 65px; 
            width: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .logo a:hover img {
            transform: scale(1.05); /* Efek zoom sedikit saat disentuh */
        }

        /* Navigation */
        .main-nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .main-nav a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            transition: color 0.3s ease;
        }

        /* Garis bawah animasi saat hover */
        .main-nav a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .main-nav a:hover {
            color: var(--accent-color);
        }

        .main-nav a:hover::after {
            width: 100%;
        }

        /* Header Actions (Ikon Pencarian & Keranjang) */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .icon-btn {
            text-decoration: none;
            color: var(--primary-color);
            font-size: 1.2rem;
            position: relative;
            transition: color 0.3s ease;
            cursor: pointer;
            background: none;
            border: none;
        }

        .icon-btn:hover {
            color: var(--accent-color);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background-color: var(--accent-color);
            color: #fff;
            font-size: 0.65rem;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tombol Hamburger (Hanya muncul di HP) */
        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary-color);
        }

        /* --- HERO SECTION (Tambahan preview konten) --- */
        .hero {
            height: calc(100vh - 85px);
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1615634260167-c8cdede054de?ixlib=rb-4.0.3&auto=format&fit=crop&w=1400&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            color: #fff;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 300;
        }

        .btn-primary {
            padding: 14px 35px;
            background-color: var(--accent-color);
            color: #000;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            border-radius: 2px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary:hover {
            background-color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* --- RESPONSIVE DESIGN (Tampilan HP) --- */
        @media (max-width: 900px) {
            .main-nav {
                position: fixed;
                top: 85px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 85px);
                background-color: var(--bg-color);
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding-top: 50px;
                transition: left 0.4s ease;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            }

            .main-nav.active {
                left: 0;
            }

            .main-nav ul {
                flex-direction: column;
                gap: 30px;
                width: 100%;
                text-align: center;
            }

            .main-nav a {
                font-size: 1.1rem;
            }

            .menu-toggle {
                display: block; /* Tampilkan ikon hamburger di HP */
            }
            
            .logo img {
                height: 50px;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }
            .hero-content p {
                font-size: 1rem;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ============ HEADER ============ -->
    <header class="main-header">
        <div class="container header-wrapper">
            
            <!-- Logo -->
            <div class="logo">
                <a href="#">
                    <img src="https://i.ibb.co.com/Kcq4MS3s/pusaka-parfum.png" alt="PUSAKA AROMA Logo">
                </a>
            </div>
            
            <!-- Menu Navigasi -->
            <nav class="main-nav">
                <ul>
                    <li><a href="#home">Beranda</a></li>
                    <li><a href="#products">Koleksi Parfum</a></li>
                    <li><a href="#about">Tentang Kami</a></li>
                    <li><a href="#testimonials">Testimoni</a></li>
                    <li><a href="#contact">Kontak</a></li>
                </ul>
            </nav>

            <!-- Aksi Header (Pencarian, Keranjang, Menu HP) -->
            <div class="header-actions">
                <a href="#search" class="icon-btn" aria-label="Cari Produk">🔍</a>
                <a href="#cart" class="icon-btn" aria-label="Keranjang Belanja">
                    🛒 <span class="cart-count">0</span>
                </a>
                <button class="menu-toggle" aria-label="Toggle Menu">☰</button>
            </div>

        </div>
    </header>

    <!-- ============ KONTEN TAMBAHAN (PREVIEW) ============ -->
    <main>
        <section class="hero" id="home">
            <div class="hero-content">
                <h1>Wewangian Warisan Nusantara</h1>
                <p>Temukan keanggunan sejati dengan koleksi parfum premium PUSAKA AROMA yang terinspirasi dari kekayaan rempah Indonesia.</p>
                <a href="#products" class="btn-primary">Lihat Koleksi</a>
            </div>
        </section>
    </main>

    <!-- ============ JAVASCRIPT ============ -->
    <script>
        // Fitur untuk membuka/menutup menu pada tampilan HP (Mobile)
        const menuToggle = document.querySelector('.menu-toggle');
        const mainNav = document.querySelector('.main-nav');

        menuToggle.addEventListener('click', () => {
            mainNav.classList.toggle('active');
            // Ganti ikon hamburger (☰) menjadi silang (✕) saat menu dibuka
            menuToggle.innerHTML = mainNav.classList.contains('active') ? '✕' : '☰';
        });

        // Tutup otomatis menu saat salah satu link diklik (pengalaman mobile yang lebih baik)
        const navLinks = document.querySelectorAll('.main-nav a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                mainNav.classList.remove('active');
                menuToggle.innerHTML = '☰';
            });
        });
    </script>

</body>
</html>
